<div class="relative modal-container"
     aria-labelledby="modal-title"
     role="dialog"
     aria-modal="true">
  <div class="fixed inset-0 modal-backdrop transition-opacity"></div>
  <div class="fixed inset-0 z-10 overflow-y-auto ">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
        <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4 dark:bg-gray-800">
          <div class="flex justify-between items-center pb-3">
            <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
              {{ _("Edit Agent") }}
            </h1>
          </div>
          <p class="mt-2 pb-2 text-sm text-red-600 dark:text-red-500">
            <span class="font-medium">{{ error }}</span>
          </p>
          <form class="space-y-4 md:space-y-6"
                hx-post="{{ url_for('notify.edit', agent_id=agent.id) }}"
                hx-target="#tab-body"
                hx-swap="innerHTML">
            <div>
              <label for="name"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ _("Name") }}</label>
              <input type="text"
                     name="name"
                     id="name"
                     value="{{ agent.name }}"
                     placeholder='e.g. "My Agent"'
                     class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                     required>
            </div>
            <div>
              <label for="notification_service"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("Notification Service") }}
              </label>
              <select name="notification_service"
                      id="notification_service"
                      class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                      onchange="toggleService(this.value)">
                <option value="apprise" {% if agent.type == 'apprise' %}selected{% endif %}>Apprise</option>
                <option value="discord" {% if agent.type == 'discord' %}selected{% endif %}>Discord</option>
                <option value="notifiarr"
                        {% if agent.type == 'notifiarr' %}selected{% endif %}>Notifiarr</option>
                <option value="ntfy" {% if agent.type == 'ntfy' %}selected{% endif %}>Ntfy</option>
                <option value="smtp" {% if agent.type == 'smtp' %}selected{% endif %}>SMTP</option>
              </select>
            </div>
            <div id="notifiarrSection"
                 class="notificationAgentInfo"
                 style="display:
                        {% if agent.type == 'notifiarr' %}
                          block
                        {% else %}
                          none
                        {% endif %}">
              <label for="channel_id"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ _("Channel ID") }}</label>
              <input type="text"
                     name="channel_id"
                     id="channel_id"
                     value="{{ agent.channel_id or '' }}"
                     class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                     {% if agent.type == 'notifiarr' %}required{% endif %} />
            </div>
            <div id="credentialsSection"
                 class="notificationAgentInfo"
                 style="display:
                        {% if agent.type == 'ntfy' or agent.type == 'smtp' %}
                          block
                        {% else %}
                          none
                        {% endif %}">
              <label for="username"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("Username (optional)") }}
              </label>
              <input type="text"
                     name="username"
                     id="username"
                     value="{{ agent.username or '' }}"
                     class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
              <label for="password"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("Password (optional)") }}
              </label>
              <input type="password"
                     name="password"
                     id="password"
                     value="{{ agent.password or '' }}"
                     class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
            </div>
                 <div id="smtpSection"
                 class="notificationAgentInfo"
                 style="display:
                   {% if agent.type == 'smtp' %}
                     block
                   {% else %}
                     none
                   {% endif %}">
              <label for="smtp_port"
                class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("SMTP Port") }}
              </label>
              <input type="number"
                name="smtp_port"
                id="smtp_port"
                min="1"
                max="65535"
                value="{{ agent.smtp_port or 587 }}"
                class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
              <label for="smtp_encryption"
                class="block mt-4 mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("Encryption") }}
              </label>
              <select name="smtp_encryption"
                 id="smtp_encryption"
                 class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                <option value="starttls" {% if (agent.smtp_encryption or 'starttls') == 'starttls' %}selected{% endif %}>STARTTLS</option>
                <option value="ssl" {% if agent.smtp_encryption == 'ssl' %}selected{% endif %}>SSL/TLS</option>
                <option value="none" {% if agent.smtp_encryption == 'none' %}selected{% endif %}>None</option>
              </select>
              <label for="smtp_from_email"
                class="block mt-4 mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("From Email") }}
              </label>
              <input type="email"
                name="smtp_from_email"
                id="smtp_from_email"
                value="{{ agent.smtp_from_email or '' }}"
                placeholder="sender@example.com"
                {% if agent.type == 'smtp' %}required{% endif %}
                class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
              <label for="smtp_to_emails"
                class="block mt-4 mb-2 text-sm font-medium text-gray-900 dark:text-white">
                {{ _("Recipient Emails") }}
              </label>
              <input type="text"
                name="smtp_to_emails"
                id="smtp_to_emails"
                value="{{ agent.smtp_to_emails or '' }}"
                placeholder="admin@example.com,ops@example.com"
                {% if agent.type == 'smtp' %}required{% endif %}
                class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500">
                 </div>
            <div>
              <label for="url"
                id="urlLabel"
                     class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ _("Agent URL") }}</label>
              <input type="text"
                     name="url"
                     id="url"
                     value="{{ agent.url }}"
                     placeholder="e.g. https://example.com"
                     class="bg-gray-50 border border-gray-300 text-gray-900 sm:text-sm rounded-lg focus:ring-primary focus:border-primary block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500"
                     required>
            </div>
            <div>
              <label class="block mb-2 text-sm font-medium text-gray-900 dark:text-white">{{ _("Notification Events") }}</label>
              <div class="space-y-2">
                {% set events = agent.notification_events.split(',') if agent.notification_events else [] %}
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_user_joined"
                         id="event_user_joined"
                         value="user_joined"
                         {% if 'user_joined' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_user_joined"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("User Joined") }}
                  </label>
                </div>
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_update_available"
                         id="event_update_available"
                         value="update_available"
                         {% if 'update_available' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_update_available"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("Update Available") }}
                  </label>
                </div>
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_user_created_confirmation"
                         id="event_user_created_confirmation"
                         value="user_created_confirmation"
                         {% if 'user_created_confirmation' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_user_created_confirmation"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("User Created Email") }}
                  </label>
                </div>
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_user_expired_notification"
                         id="event_user_expired_notification"
                         value="user_expired_notification"
                         {% if 'user_expired_notification' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_user_expired_notification"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("User Expired Email") }}
                  </label>
                </div>
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_user_manually_deleted_notification"
                         id="event_user_manually_deleted_notification"
                         value="user_manually_deleted_notification"
                         {% if 'user_manually_deleted_notification' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_user_manually_deleted_notification"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("Manual Delete Email") }}
                  </label>
                </div>
                <div class="flex items-center">
                  <input type="checkbox"
                         name="event_user_manually_disabled_notification"
                         id="event_user_manually_disabled_notification"
                         value="user_manually_disabled_notification"
                         {% if 'user_manually_disabled_notification' in events %}checked{% endif %}
                         class="w-4 h-4 text-primary bg-gray-100 border-gray-300 rounded focus:ring-primary dark:focus:ring-primary dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600">
                  <label for="event_user_manually_disabled_notification"
                         class="ml-2 text-sm font-medium text-gray-900 dark:text-gray-300">
                    {{ _("Manual Disable Email") }}
                  </label>
                </div>
              </div>
            </div>
            <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6 dark:bg-gray-800">
              <button type="submit"
                      class="inline-flex w-full justify-center rounded-md bg-primary px-3 py-2 text-sm font-semibold text-white shadow-xs hover:bg-primary_hover sm:ml-3 sm:w-auto">
                {{ _("Test & Save Changes") }}
              </button>
              <button onclick="closeModal()"
                      type="button"
                      class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-xs ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">
                {{ _("Cancel") }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
    function closeModal() {
        document.getElementById('create-modal').innerHTML = '';
    }

    function toggleService(value) {
        const notificationAgentInfo = document.getElementsByClassName('notificationAgentInfo')
      const credentialsSection = document.getElementById('credentialsSection');
      const notifiarrSection = document.getElementById('notifiarrSection');
      const smtpSection = document.getElementById('smtpSection');

        for (let i = 0; i < notificationAgentInfo.length; i++) {
            notificationAgentInfo[i].style.display = 'none';
        }

        if (value === 'ntfy' || value === 'smtp') {
            credentialsSection.style.display = 'block';
        } else if (value === "notifiarr") {
            notifiarrSection.style.display = 'block';
        }

        if (value === 'smtp') {
          smtpSection.style.display = 'block';
        }

        if (value === 'notifiarr') {
            document.getElementById("channel_id").required = true
        } else {
            document.getElementById("channel_id").required = false
        }

        const smtpFromEmailEle = document.getElementById("smtp_from_email");
        const smtpToEmailsEle = document.getElementById("smtp_to_emails");

        if (value === 'smtp') {
          smtpFromEmailEle.required = true
          smtpToEmailsEle.required = true
        } else {
          smtpFromEmailEle.required = false
          smtpToEmailsEle.required = false
        }

        const urlEle = document.getElementById('url');
        const urlLabel = document.getElementById('urlLabel');

        if (value === 'apprise') {
            urlEle.placeholder = "e.g. apprise://hostname/token";
          urlLabel.textContent = "{{ _('Agent URL') }}";
        } else if (value === 'smtp') {
          urlEle.placeholder = "e.g. smtp.mailprovider.com";
          urlLabel.textContent = "{{ _('SMTP Host') }}";
        } else {
            urlEle.placeholder = "e.g. https://example.com";
          urlLabel.textContent = "{{ _('Agent URL') }}";
        }
    }

      toggleService(document.getElementById('notification_service').value)
</script>
